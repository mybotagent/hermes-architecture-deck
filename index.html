  <!-- mermaid.js (ESM) -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose',
      fontFamily: 'system-ui, sans-serif',
      flowchart: { curve: 'basis', padding: 10 },
      gantt: { useMaxWidth: true }
    });

    // Reveal ready 후 ```mermaid 블록을 mermaid로 렌더
    const renderMermaid = async () => {
      // markdown plugin이 변환한 <pre><code class="language-mermaid"> 찾기
      const codes = document.querySelectorAll('.reveal pre code.language-mermaid');
      for (let i = 0; i < codes.length; i++) {
        const code = codes[i];
        const pre = code.parentElement;
        const source = code.textContent;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = source;
        div.id = `mermaid-graph-${i}`;
        pre.replaceWith(div);
      }
      try {
        await mermaid.run({ querySelector: '.mermaid' });
      } catch (err) {
        console.error('Mermaid render error:', err);
      }
    };

    Reveal.on('ready', renderMermaid);
    Reveal.on('slidechanged', renderMermaid);

    Reveal.initialize({
      hash: true,
      controls: true,
      progress: true,
      slideNumber: 'c/t',
      overview: true,
      center: true,
      transition: 'slide',
      transitionSpeed: 'fast',
      plugins: [ RevealMarkdown, RevealNotes, RevealHighlight ],
      markdown: {
        smartypants: false,
        gfm: true
      }
    });
  </script>
