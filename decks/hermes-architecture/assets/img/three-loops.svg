<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet" width="1000" height="600" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff9500"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#af52de"/>
    </marker>
  </defs>

  <style>
    .label-blue { font-size: 14px; font-weight: 700; fill: #0066cc; letter-spacing: 2px; }
    .label-orange { font-size: 14px; font-weight: 700; fill: #ff9500; letter-spacing: 2px; }
    .label-purple { font-size: 14px; font-weight: 700; fill: #af52de; letter-spacing: 2px; }
    .time-label { font-size: 10px; font-weight: 600; fill: #86868b; letter-spacing: 1.5px; }
    .node-blue { fill: #ffffff; stroke: #0066cc; stroke-width: 1.8; }
    .node-orange { fill: #ffffff; stroke: #ff9500; stroke-width: 1.8; }
    .node-purple { fill: #ffffff; stroke: #af52de; stroke-width: 1.8; }
    .title { font-size: 15px; font-weight: 600; fill: #1d1d1f; }
    .body { font-size: 11px; font-weight: 400; fill: #6e6e73; }
    .caption { font-size: 11px; font-weight: 600; fill: #1d1d1f; letter-spacing: 1px; }
    .arrow-blue { stroke: #0066cc; stroke-width: 2; fill: none; }
    .arrow-orange { stroke: #ff9500; stroke-width: 2; fill: none; }
    .arrow-purple { stroke: #af52de; stroke-width: 2; fill: none; }
    .time-line { stroke: #86868b; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
  </style>

  <rect width="1000" height="600" fill="#ffffff"/>

  <!-- Time arrow header (centered, no overlap) -->
  <text x="100" y="38" class="time-label">DAY 1</text>
  <line x1="145" y1="34" x2="855" y2="34" class="time-line"/>
  <polygon points="855,28 865,34 855,40" fill="#86868b"/>
  <text x="880" y="38" class="time-label">DAY 90</text>

  <!-- ============== LOOP 1: MANUAL (Blue) ============== -->
  <!-- Centered label above the row (NO LEFT OVERLAP) -->
  <text x="500" y="78" text-anchor="middle" class="label-blue">LOOP 1 · MANUAL</text>

  <!-- 3 nodes: positioned with even spacing, all within 100-900 horizontal -->
  <g transform="translate(200, 140)" filter="url(#cardShadow)">
    <rect x="-90" y="-28" width="180" height="56" rx="10" class="node-blue"/>
    <text x="0" y="-4" text-anchor="middle" class="title">workflow run</text>
    <text x="0" y="14" text-anchor="middle" class="body">do the task</text>
  </g>

  <g transform="translate(500, 140)" filter="url(#cardShadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" class="node-blue"/>
    <text x="0" y="-4" text-anchor="middle" class="title">procedure written</text>
    <text x="0" y="14" text-anchor="middle" class="body">SKILL.md updated</text>
  </g>

  <g transform="translate(800, 140)" filter="url(#cardShadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" class="node-blue"/>
    <text x="0" y="-4" text-anchor="middle" class="title">next run faster</text>
    <text x="0" y="14" text-anchor="middle" class="body">less time, fewer mistakes</text>
  </g>

  <!-- Forward arrows -->
  <line x1="290" y1="140" x2="400" y2="140" class="arrow-blue" marker-end="url(#arrowBlue)"/>
  <line x1="600" y1="140" x2="700" y2="140" class="arrow-blue" marker-end="url(#arrowBlue)"/>

  <!-- Loop-back arrow (curved) -->
  <path d="M 800 168 Q 800 215 500 215 Q 200 215 200 168" class="arrow-blue" marker-end="url(#arrowBlue)"/>

  <!-- Bottom caption -->
  <text x="500" y="240" text-anchor="middle" class="caption">⌁ MANUAL cost: minutes — BRAIN cost without manual: hours</text>

  <!-- ============== LOOP 2: MEMORY (Orange) ============== -->
  <text x="500" y="285" text-anchor="middle" class="label-orange">LOOP 2 · MEMORY</text>

  <g transform="translate(200, 340)" filter="url(#cardShadow)">
    <rect x="-90" y="-28" width="180" height="56" rx="10" class="node-orange"/>
    <text x="0" y="-4" text-anchor="middle" class="title">session ends</text>
    <text x="0" y="14" text-anchor="middle" class="body">notes captured</text>
  </g>

  <g transform="translate(500, 340)" filter="url(#cardShadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" class="node-orange"/>
    <text x="0" y="-4" text-anchor="middle" class="title">notebook updated</text>
    <text x="0" y="14" text-anchor="middle" class="body">user.md + diary</text>
  </g>

  <g transform="translate(800, 340)" filter="url(#cardShadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" class="node-orange"/>
    <text x="0" y="-4" text-anchor="middle" class="title">next turn warmer</text>
    <text x="0" y="14" text-anchor="middle" class="body">context pre-loaded</text>
  </g>

  <line x1="290" y1="340" x2="400" y2="340" class="arrow-orange" marker-end="url(#arrowOrange)"/>
  <line x1="600" y1="340" x2="700" y2="340" class="arrow-orange" marker-end="url(#arrowOrange)"/>

  <path d="M 800 368 Q 800 415 500 415 Q 200 415 200 368" class="arrow-orange" marker-end="url(#arrowOrange)"/>

  <text x="500" y="440" text-anchor="middle" class="caption">⌁ notebook holds 1,847 chars · every session reloads it</text>

  <!-- ============== LOOP 3: PIPELINE (Purple) ============== -->
  <text x="500" y="485" text-anchor="middle" class="label-purple">LOOP 3 · PIPELINE</text>

  <g transform="translate(200, 535)" filter="url(#cardShadow)">
    <rect x="-90" y="-28" width="180" height="56" rx="10" class="node-purple"/>
    <text x="0" y="-4" text-anchor="middle" class="title">monthly review</text>
    <text x="0" y="14" text-anchor="middle" class="body">1st of each month</text>
  </g>

  <g transform="translate(500, 535)" filter="url(#cardShadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" class="node-purple"/>
    <text x="0" y="-4" text-anchor="middle" class="title">past calls analyzed</text>
    <text x="0" y="14" text-anchor="middle" class="body">misses + successes</text>
  </g>

  <g transform="translate(800, 535)" filter="url(#cardShadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" class="node-purple"/>
    <text x="0" y="-4" text-anchor="middle" class="title">prompts sharper</text>
    <text x="0" y="14" text-anchor="middle" class="body">Soul.md refined</text>
  </g>

  <line x1="290" y1="535" x2="400" y2="535" class="arrow-purple" marker-end="url(#arrowPurple)"/>
  <line x1="600" y1="535" x2="700" y2="535" class="arrow-purple" marker-end="url(#arrowPurple)"/>

  <text x="500" y="588" text-anchor="middle" class="caption">⌁ the compound is in the file system, not in the model weights</text>

</svg>