<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" preserveAspectRatio="xMidYMid meet" width="1100" height="680" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#0066cc" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0066cc"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#86868b"/>
    </marker>
  </defs>

  <style>
    .section-label { font-size: 12px; font-weight: 700; fill: #86868b; letter-spacing: 2.5px; }
    .card { fill: #ffffff; stroke: #d2d2d7; stroke-width: 1.2; }
    .card-blue { fill: #ffffff; stroke: #0066cc; stroke-width: 2; }
    .card-blue-fill { fill: rgba(0,102,204,0.05); stroke: #0066cc; stroke-width: 2; }
    .card-layer { fill: #fafafc; stroke: #d2d2d7; stroke-width: 1; }
    .card-layer-blue { fill: rgba(0,102,204,0.04); stroke: #0066cc; stroke-width: 1.2; }
    .card-sub { fill: #ffffff; stroke: #86868b; stroke-width: 1; stroke-dasharray: 4,3; }
    .title { font-size: 17px; font-weight: 600; fill: #1d1d1f; }
    .title-blue { font-size: 17px; font-weight: 600; fill: #0066cc; }
    .body { font-size: 12px; font-weight: 400; fill: #6e6e73; }
    .mono { font-size: 11px; font-weight: 500; fill: #86868b; font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .mono-small { font-size: 10px; font-weight: 400; fill: #86868b; font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .layer-num { font-size: 14px; font-weight: 700; fill: #0066cc; }
    .layer-label { font-size: 15px; font-weight: 600; fill: #1d1d1f; }
    .layer-desc { font-size: 11px; font-weight: 400; fill: #6e6e73; }
    .footer { font-size: 13px; font-weight: 600; fill: #1d1d1f; letter-spacing: 1px; }
    .footer-sub { font-size: 11px; font-weight: 400; fill: #6e6e73; }
    .arrow-blue { stroke: #0066cc; stroke-width: 2; fill: none; }
    .arrow-gray { stroke: #86868b; stroke-width: 1.3; fill: none; stroke-dasharray: 3,3; }
  </style>

  <rect width="1100" height="680" fill="#ffffff"/>

  <!-- Section labels -->
  <text x="170" y="38" text-anchor="middle" class="section-label">① KARPATHY PATTERN</text>
  <text x="550" y="38" text-anchor="middle" class="section-label">② FIVE LAYERS</text>
  <text x="930" y="38" text-anchor="middle" class="section-label">③ GITHUB SUBMODULES</text>

  <!-- ============ LEFT: Karpathy Pattern ============ -->
  <g transform="translate(50, 70)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="240" height="100" rx="14" class="card"/>
    <text x="120" y="32" text-anchor="middle" class="title">Karpathy Gist</text>
    <text x="120" y="56" text-anchor="middle" class="body">LLM-consumable knowledge base</text>
    <text x="120" y="76" text-anchor="middle" class="mono-small">gist.github.com/karpathy/</text>
    <text x="120" y="90" text-anchor="middle" class="mono-small">442a6bf5...119de94f</text>
  </g>

  <g transform="translate(50, 190)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="240" height="100" rx="14" class="card-blue" filter="url(#glowBlue)"/>
    <text x="120" y="32" text-anchor="middle" class="title-blue">INDEX.md</text>
    <text x="120" y="56" text-anchor="middle" class="body">master table of contents</text>
    <text x="120" y="74" text-anchor="middle" class="body">+ related links graph</text>
    <text x="120" y="92" text-anchor="middle" class="mono-small">read first · every session</text>
  </g>

  <g transform="translate(50, 310)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="240" height="100" rx="14" class="card"/>
    <text x="120" y="32" text-anchor="middle" class="title">Concise pages</text>
    <text x="120" y="56" text-anchor="middle" class="body">1–5 KB each · interlinked</text>
    <text x="120" y="74" text-anchor="middle" class="body">no Google-page-1 trivia</text>
    <text x="120" y="92" text-anchor="middle" class="mono-small">unique insight only</text>
  </g>

  <!-- ============ CENTER: Five Layers (stacked) ============ -->
  <g transform="translate(380, 70)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="340" height="60" rx="10" class="card-layer"/>
    <circle cx="28" cy="30" r="16" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
    <text x="28" y="35" text-anchor="middle" class="layer-num">1</text>
    <text x="58" y="26" class="layer-label">Schema</text>
    <text x="58" y="44" class="layer-desc">SCHEMA.md · AGENTS.md · lint rules</text>
  </g>

  <g transform="translate(380, 145)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="340" height="60" rx="10" class="card-layer"/>
    <circle cx="28" cy="30" r="16" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
    <text x="28" y="35" text-anchor="middle" class="layer-num">2</text>
    <text x="58" y="26" class="layer-label">Raw</text>
    <text x="58" y="44" class="layer-desc">immutable external sources · provenance</text>
  </g>

  <g transform="translate(380, 220)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="340" height="60" rx="10" class="card-layer-blue"/>
    <circle cx="28" cy="30" r="16" fill="rgba(0,102,204,0.1)" stroke="#0066cc" stroke-width="1.5"/>
    <text x="28" y="35" text-anchor="middle" class="layer-num">3</text>
    <text x="58" y="26" class="layer-label" fill="#0066cc">Research</text>
    <text x="58" y="44" class="layer-desc">entity · concept · comparison (typed)</text>
  </g>

  <g transform="translate(380, 295)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="340" height="60" rx="10" class="card-layer"/>
    <circle cx="28" cy="30" r="16" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
    <text x="28" y="35" text-anchor="middle" class="layer-num">4</text>
    <text x="58" y="26" class="layer-label">Operational</text>
    <text x="58" y="44" class="layer-desc">infra · analysis · code · repos · people</text>
  </g>

  <g transform="translate(380, 370)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="340" height="60" rx="10" class="card-layer"/>
    <circle cx="28" cy="30" r="16" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
    <text x="28" y="35" text-anchor="middle" class="layer-num">5</text>
    <text x="58" y="26" class="layer-label">Logs</text>
    <text x="58" y="44" class="layer-desc">timestamped change history · 6mo archive</text>
  </g>

  <!-- ============ RIGHT: GitHub Submodules ============ -->
  <g transform="translate(760, 70)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="290" height="64" rx="12" class="card-blue" filter="url(#glowBlue)"/>
    <text x="145" y="26" text-anchor="middle" class="title-blue">hermes-wiki-super</text>
    <text x="145" y="46" text-anchor="middle" class="mono-small">super repo · 4 submodules · private</text>
  </g>

  <g transform="translate(760, 150)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="290" height="52" rx="10" class="card-sub"/>
    <text x="20" y="22" class="mono">logs/</text>
    <text x="20" y="38" class="mono-small">hermes-logs · change history</text>
    <text x="270" y="32" text-anchor="end" class="layer-desc">①</text>
  </g>

  <g transform="translate(760, 212)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="290" height="52" rx="10" class="card-sub"/>
    <text x="20" y="22" class="mono">subagents-library/</text>
    <text x="20" y="38" class="mono-small">delegation templates</text>
    <text x="270" y="32" text-anchor="end" class="layer-desc">②</text>
  </g>

  <g transform="translate(760, 274)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="290" height="52" rx="10" class="card-sub"/>
    <text x="20" y="22" class="mono">skills-library/</text>
    <text x="20" y="38" class="mono-small">SKILL.md repository</text>
    <text x="270" y="32" text-anchor="end" class="layer-desc">③</text>
  </g>

  <g transform="translate(760, 336)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="290" height="52" rx="10" class="card-sub"/>
    <text x="20" y="22" class="mono">agents-library/</text>
    <text x="20" y="38" class="mono-small">agent role templates</text>
    <text x="270" y="32" text-anchor="end" class="layer-desc">④</text>
  </g>

  <!-- ============ ARROWS ============ -->

  <!-- Karpathy (left) → INDEX.md (center top via curve) -->
  <!-- Karpathy → 5 Layers (center stack) - 3 arrows from left to center -->
  <path d="M 290 120 Q 340 120 380 100" class="arrow-blue" marker-end="url(#arrowBlue)"/>
  <path d="M 290 240 Q 340 240 380 250" class="arrow-blue" marker-end="url(#arrowBlue)"/>
  <path d="M 290 360 Q 340 360 380 400" class="arrow-blue" marker-end="url(#arrowBlue)"/>

  <!-- 5 Layers → Submodules - 4 arrows from center right to submodule stack -->
  <path d="M 720 100 Q 740 100 760 102" class="arrow-blue" marker-end="url(#arrowBlue)"/>
  <path d="M 720 400 Q 740 400 760 176" class="arrow-blue" marker-end="url(#arrowBlue)"/>
  <path d="M 720 400 Q 740 400 760 238" class="arrow-blue" marker-end="url(#arrowBlue)"/>
  <path d="M 720 400 Q 740 400 760 300" class="arrow-blue" marker-end="url(#arrowBlue)"/>
  <path d="M 720 400 Q 740 400 760 362" class="arrow-blue" marker-end="url(#arrowBlue)"/>

  <!-- ============ BOTTOM: Topic-specific repos ============ -->
  <g transform="translate(50, 470)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="1000" height="100" rx="14" class="card-layer"/>
    <text x="30" y="32" class="title">④ Topic-specific repos</text>
    <text x="30" y="54" class="body">each topic = own private GitHub repo, own INDEX.md, own history</text>

    <!-- 4 repo chips -->
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="220" height="22" rx="11" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
      <text x="110" y="15" text-anchor="middle" class="mono">hermes-wiki-claude-code</text>
    </g>
    <g transform="translate(265, 70)">
      <rect x="0" y="0" width="200" height="22" rx="11" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
      <text x="100" y="15" text-anchor="middle" class="mono">hermes-wiki-codex</text>
    </g>
    <g transform="translate(480, 70)">
      <rect x="0" y="0" width="200" height="22" rx="11" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
      <text x="100" y="15" text-anchor="middle" class="mono">hermes-wiki-super</text>
    </g>
    <g transform="translate(695, 70)">
      <rect x="0" y="0" width="265" height="22" rx="11" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
      <text x="132" y="15" text-anchor="middle" class="mono">harness-engineering-wiki</text>
    </g>
  </g>

  <!-- ============ FOOTER: Why this works ============ -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="1000" height="56" rx="14" class="card-blue-fill"/>
    <text x="20" y="22" class="footer">⌁ WHY THIS WORKS</text>
    <text x="20" y="42" class="footer-sub">one `git clone --recurse-submodules` gives the agent the full KB · each topic has independent version history · no merge conflicts</text>
  </g>

</svg>