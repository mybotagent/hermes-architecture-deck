<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Cache busting -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Hermes Configuration Architecture</title>
  <meta name="description" content="A seven-component agent system.">

  <!-- Reveal.js 5.1 (CDN, with cache-buster) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css?v=2">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css?v=2">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">

  <!-- =========================================================
       APPLE DESIGN SYSTEM (from npx getdesign@latest add apple)
       Reference: decks/hermes-architecture/APPLE-DESIGN.md
       ========================================================= -->
  <style>
    /* Apple Design Tokens — verbatim from APPLE-DESIGN.md */
    :root {
      --primary: #0066cc;
      --primary-focus: #0071e3;
      --primary-on-dark: #2997ff;
      --ink: #1d1d1f;
      --body: #1d1d1f;
      --body-on-dark: #ffffff;
      --body-muted: #cccccc;
      --ink-muted-80: #333333;
      --ink-muted-48: #7a7a7a;
      --divider-soft: #f0f0f0;
      --hairline: #e0e0e0;
      --canvas: #ffffff;
      --canvas-parchment: #f5f5f7;
      --surface-pearl: #fafafc;
      --surface-tile-1: #272729;
      --surface-tile-2: #2a2a2c;
      --surface-tile-3: #252527;
      --surface-black: #000000;
      --surface-chip-translucent: #d2d2d7;
      --on-primary: #ffffff;
      --on-dark: #ffffff;
    }

    /* Reset */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--surface-black);
      color: var(--body-on-dark);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      overflow: hidden;
      touch-action: manipulation;
      font-feature-settings: "ss01", "ss02";
    }

    /* Reveal container — flat, no scale transform */
    .reveal { width: 100%; height: 100%; position: relative; }

    .reveal .slides {
      width: 100% !important;
      height: 100% !important;
      transform: none !important;
      inset: 0 !important;
      text-align: center;
      position: absolute;
    }

    /* Single slide — Apple keynote presentation mode */
    .reveal .slides > section {
      width: 100% !important;
      height: 100% !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      display: none !important;
      padding: 6vh 6vw;
      text-align: center;
      overflow: hidden;
    }
    .reveal .slides > section.present { display: block !important; }

    /* Apple typography — exact scale from APPLE-DESIGN.md */
    .reveal h1 {
      font-family: -apple-system, "SF Pro Display", sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 600;
      line-height: 1.07;
      letter-spacing: -0.035em;
      color: var(--body-on-dark);
      margin: 0 auto 0.4em;
      max-width: 14ch;
      text-align: center;
    }
    .reveal h1 em {
      font-style: italic;
      font-weight: 500;
      color: var(--primary-on-dark);
    }

    .reveal h2 {
      font-family: -apple-system, "SF Pro Display", sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--body-on-dark);
      margin: 0 auto 0.5em;
      max-width: 80%;
      text-align: center;
    }

    .reveal h3 {
      font-family: -apple-system, "SF Pro Text", sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 600;
      color: var(--primary-on-dark);
      margin: 0 auto 0.6em;
      max-width: 80%;
      text-align: center;
    }

    .reveal p, .reveal li {
      font-family: -apple-system, "SF Pro Text", sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      line-height: 1.47;
      letter-spacing: -0.01em;
      color: var(--body-on-dark);
      text-align: left;
      max-width: 70ch;
      margin: 0 auto 0.6em;
    }

    .reveal strong { font-weight: 600; color: var(--on-dark); }
    .reveal em { font-style: italic; color: var(--primary-on-dark); }

    /* Apple TL;DR card */
    .reveal .tldr {
      background: linear-gradient(135deg, rgba(0, 102, 204, 0.12) 0%, rgba(41, 151, 255, 0.04) 100%);
      border: 1px solid rgba(41, 151, 255, 0.3);
      border-radius: 18px;
      padding: 1.6em 2em;
      margin: 1.4em auto;
      max-width: 700px;
      display: block;
    }
    .reveal .tldr h3 { margin-top: 0; text-align: left; }
    .reveal .tldr table { margin: 0.5em 0; }
    .reveal .tldr th, .reveal .tldr td { padding: 0.4em 0.7em; }

    /* Apple tables */
    .reveal table {
      font-size: clamp(0.7rem, 1.4vw, 0.9rem);
      border-collapse: separate;
      border-spacing: 0;
      margin: 1em auto;
      max-width: 700px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      overflow: hidden;
      width: 100%;
    }
    .reveal th {
      background: rgba(255,255,255,0.04);
      color: var(--body-on-dark);
      padding: 0.7em 1em;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .reveal td {
      padding: 0.55em 1em;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--body-on-dark);
    }
    .reveal tr:last-child td { border-bottom: none; }
    .reveal tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    /* Apple flow chart — flat, inline-block, single accent */
    .flow-chart {
      text-align: center !important;
      margin: 1.2em auto;
      max-width: 800px;
      font-size: 15px;
    }
    .flow-row {
      text-align: center !important;
      line-height: 2.4;
      font-size: 1em;
      margin: 0.5em 0;
      word-spacing: 0.4em;
    }
    .flow-group {
      display: block;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 1em 1.4em;
      margin: 0.8em auto;
      max-width: 750px;
    }
    .flow-group-label {
      display: block;
      font-size: 0.7em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--body-muted);
      font-weight: 500;
      margin-bottom: 0.6em;
      text-align: center;
    }

    .flow-node {
      display: inline-block !important;
      vertical-align: middle !important;
      padding: 0.65em 1.2em;
      border-radius: 12px;
      font-size: 0.85em;
      font-weight: 500;
      text-align: center !important;
      line-height: 1.35;
      margin: 0.3em 0.3em;
      max-width: 240px;
      word-wrap: break-word;
    }
    .flow-node .node-label {
      display: block !important;
      font-size: 1em;
      font-weight: 600;
      margin-bottom: 0.2em;
    }
    .flow-node .node-sub {
      display: block !important;
      font-size: 0.78em;
      font-weight: 400;
      opacity: 0.75;
      margin-top: 0.2em;
    }

    /* Apple system colors — single accent palette */
    .flow-node.long-term { background: rgba(41,151,255,0.18); border: 1px solid rgba(41,151,255,0.5); color: #fff; }
    .flow-node.tooling  { background: rgba(255,45,85,0.18);  border: 1px solid rgba(255,45,85,0.5);  color: #fff; }
    .flow-node.compute  { background: rgba(255,149,0,0.18);  border: 1px solid rgba(255,149,0,0.5);  color: #fff; }
    .flow-node.data     { background: rgba(175,82,222,0.18); border: 1px solid rgba(175,82,222,0.5); color: #fff; }
    .flow-node.output   { background: rgba(52,199,89,0.18);  border: 1px solid rgba(52,199,89,0.5);  color: #fff; }
    .flow-node.simple   { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); color: #fff; }

    .flow-arrow {
      display: inline-block !important;
      vertical-align: middle !important;
      color: var(--primary-on-dark);
      font-size: 1.1em;
      font-weight: 600;
      margin: 0 0.25em;
      line-height: 1;
    }
    .flow-arrow::before { content: "↓"; }
    .flow-arrow.right::before { content: "→"; }
    .flow-arrow.left::before { content: "←"; }
    .flow-arrow.up::before { content: "↑"; }

    /* Reveal progress (Apple blue) */
    .reveal .progress { background: rgba(255,255,255,0.08); height: 3px; }
    .reveal .progress span { background: var(--primary-on-dark); }

    /* Reveal controls */
    .reveal .controls { color: var(--primary-on-dark); opacity: 0.6; }
    .reveal .controls button { opacity: 0.7; }

    /* Apple small text */
    .small {
      display: block;
      font-size: 0.7em;
      color: var(--body-muted);
      font-weight: 300;
      text-align: center;
      margin: 1em auto 0;
      max-width: 60ch;
    }

    /* Apple blockquote */
    .reveal blockquote {
      background: rgba(255,255,255,0.03);
      border-left: 3px solid var(--primary-on-dark);
      padding: 1em 1.4em;
      font-style: italic;
      border-radius: 0 14px 14px 0;
      max-width: 65ch;
      margin: 1em auto;
      text-align: left;
    }

    /* Mobile optimization */
    @media (max-width: 600px) {
      .reveal .slides > section { padding: 4vh 5vw; }
      .flow-node { font-size: 0.7em; padding: 0.45em 0.8em; max-width: 170px; }
      .reveal h1 { font-size: 1.8rem; }
      .reveal h2 { font-size: 1.3rem; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .reveal .slides > section { padding: 2vh 4vw; }
      .flow-node { font-size: 0.65em; padding: 0.35em 0.7em; }
      .reveal h1 { font-size: 1.5rem; margin-bottom: 0.2em; }
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <section data-markdown="slides/all-slides.md"
               data-separator="^---$"
               data-separator-vertical="^----$"
               data-separator-notes="^Note:">
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js?v=2"></script>

  <script>
    Reveal.initialize({
      hash: true,
      controls: true,
      progress: true,
      slideNumber: 'c/t',
      overview: true,
      center: false,
      disableLayout: true,
      transition: 'slide',
      transitionSpeed: 'fast',
      plugins: [ RevealMarkdown, RevealNotes ],
      markdown: { smartypants: false, gfm: true }
    });
  </script>
</body>
</html>
