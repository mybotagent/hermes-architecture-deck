<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Hermes Configuration Architecture</title>
  <meta name="description" content="A seven-component agent system.">

  <!-- Reveal.js 5.1 (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">

  <!-- ============================================
       INLINE CSS — bypasses all cache and load issues
       Single source of truth for deck styling
       ============================================ -->
  <style>
    :root {
      --apple-primary-on-dark: #2997ff;
      --apple-body-on-dark: #ffffff;
      --apple-body-muted: #86868b;
      --apple-surface-black: #000000;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--apple-surface-black);
      color: var(--apple-body-on-dark);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* Reveal container — no transform scaling */
    .reveal { width: 100%; height: 100%; position: relative; }

    /* Disable Reveal's scale transform on slide wrapper */
    .reveal .slides {
      width: 100% !important;
      height: 100% !important;
      transform: none !important;
      inset: 0 !important;
      text-align: center;
      position: absolute;
    }

    .reveal .slides > section {
      width: 100% !important;
      height: 100% !important;
      transform: none !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      display: block !important;
      padding: 2.5vh 4vw;
      text-align: left;
      overflow: hidden;
      visibility: hidden;
    }
    .reveal .slides > section.present { visibility: visible; }

    /* Typography */
    .reveal h1 {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #fff;
      margin: 0 0 0.4em;
    }
    .reveal h1 em { font-style: italic; font-weight: 500; color: var(--apple-primary-on-dark); }

    .reveal h2 {
      font-family: -apple-system, "SF Pro Display", sans-serif;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: #fff;
      margin: 0 0 0.5em;
    }

    .reveal h3 {
      font-family: -apple-system, "SF Pro Text", sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.3rem);
      font-weight: 600;
      color: var(--apple-primary-on-dark);
      margin: 0 0 0.5em;
    }

    .reveal p, .reveal li {
      font-family: -apple-system, "SF Pro Text", sans-serif;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      line-height: 1.5;
      color: #fff;
      margin: 0 0 0.6em;
    }

    .reveal strong { font-weight: 600; }
    .reveal em { font-style: italic; color: var(--apple-primary-on-dark); }

    .reveal code {
      background: rgba(255,255,255,0.08);
      color: var(--apple-primary-on-dark);
      padding: 0.1em 0.4em;
      border-radius: 5px;
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 0.9em;
    }

    /* Tables */
    .reveal table {
      font-size: clamp(0.65rem, 1.6vw, 0.85rem);
      border-collapse: separate;
      border-spacing: 0;
      margin: 1em 0;
      width: 100%;
      max-width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    .reveal table th {
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 0.6em 0.8em;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .reveal table td {
      padding: 0.5em 0.8em;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #fff;
    }
    .reveal table tr:last-child td { border-bottom: none; }
    .reveal table tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    /* Blockquote */
    .reveal blockquote {
      background: rgba(255,255,255,0.04);
      border-left: 3px solid var(--apple-primary-on-dark);
      padding: 0.8em 1.2em;
      font-style: italic;
      border-radius: 0 12px 12px 0;
      margin: 1em 0;
    }

    /* ============================================
       Flow Charts — strict inline-block (mobile-safe)
       ============================================ */

    .flow-chart {
      text-align: center !important;
      margin: 1em 0;
      font-size: 14px;
    }

    .flow-row {
      text-align: center !important;
      line-height: 2.2;
      font-size: 1em;
      margin: 0.4em 0;
      word-spacing: 0.3em;
    }

    .flow-group {
      display: block;
      text-align: center;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 0.8em 1em;
      margin: 0.6em 0;
      max-width: 100%;
    }
    .flow-group-label {
      display: block;
      font-size: 0.65em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--apple-body-muted);
      font-weight: 500;
      margin-bottom: 0.6em;
      text-align: center;
    }

    .flow-node {
      display: inline-block !important;
      vertical-align: middle !important;
      padding: 0.5em 1em;
      border-radius: 10px;
      font-size: 0.85em;
      font-weight: 500;
      text-align: center !important;
      line-height: 1.35;
      margin: 0.3em 0.25em;
      max-width: 220px;
      word-wrap: break-word;
    }

    .flow-node .node-label {
      display: block !important;
      font-size: 1em;
      font-weight: 600;
      margin-bottom: 0.2em;
    }
    .flow-node .node-sub {
      display: block !important;
      font-size: 0.78em;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 0.2em;
    }

    .flow-node.long-term { background: rgba(41,151,255,0.18); border: 1px solid rgba(41,151,255,0.5); color: #fff; }
    .flow-node.tooling  { background: rgba(255,45,85,0.18);  border: 1px solid rgba(255,45,85,0.5);  color: #fff; }
    .flow-node.compute  { background: rgba(255,149,0,0.18);  border: 1px solid rgba(255,149,0,0.5);  color: #fff; }
    .flow-node.data     { background: rgba(175,82,222,0.18); border: 1px solid rgba(175,82,222,0.5); color: #fff; }
    .flow-node.output   { background: rgba(52,199,89,0.18);  border: 1px solid rgba(52,199,89,0.5);  color: #fff; }
    .flow-node.simple   { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.22); color: #fff; }

    .flow-arrow {
      display: inline-block !important;
      vertical-align: middle !important;
      color: var(--apple-primary-on-dark);
      font-size: 1.1em;
      font-weight: 600;
      margin: 0 0.25em;
      line-height: 1;
    }
    .flow-arrow::before { content: "↓"; }
    .flow-arrow.right::before { content: "→"; }
    .flow-arrow.left::before { content: "←"; }
    .flow-arrow.up::before { content: "↑"; }

    .flow-label {
      display: block;
      font-size: 0.7em;
      color: var(--apple-body-muted);
      font-style: italic;
      text-align: center;
      margin: 0.3em 0;
    }

    .flow-decision {
      display: inline-block !important;
      padding: 0.5em 1.1em;
      border-radius: 14px;
      background: rgba(255,204,0,0.18);
      border: 1.5px solid rgba(255,204,0,0.55);
      color: #fff;
      font-size: 0.9em;
      font-weight: 500;
      font-style: italic;
      vertical-align: middle;
      margin: 0.3em 0.25em;
    }

    /* Section opener */
    .section-opener { text-align: left; padding-top: 0.5em; }
    .section-opener .section-num {
      font-size: 0.75em;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--apple-body-muted);
      font-weight: 500;
      margin-bottom: 0.8em;
      display: block;
    }
    .section-opener h2 {
      font-size: clamp(1.5rem, 4.5vw, 2.4rem);
      margin-bottom: 0.4em;
    }
    .section-opener .section-lead {
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      font-weight: 300;
      color: var(--apple-body-muted);
      line-height: 1.4;
    }

    /* TL;DR card */
    .tldr {
      background: linear-gradient(135deg, rgba(0,102,204,0.14) 0%, rgba(41,151,255,0.06) 100%);
      border: 1px solid rgba(41,151,255,0.28);
      border-radius: 18px;
      padding: 1.2em 1.5em;
      margin: 1em 0;
    }
    .tldr h3 { margin-top: 0; }

    /* Small text */
    .small {
      font-size: 0.7em;
      color: var(--apple-body-muted);
      font-weight: 300;
    }

    /* Reveal controls (kept minimal) */
    .reveal .controls { color: var(--apple-primary-on-dark); opacity: 0.5; }
    .reveal .controls button { opacity: 0.7; }

    .reveal .progress { background: rgba(255,255,255,0.08); height: 3px; }
    .reveal .progress span { background: var(--apple-primary-on-dark); }

    /* Mobile portrait optimization */
    @media (max-width: 600px) {
      .reveal .slides > section { padding: 2vh 4vw; }
      .flow-node { font-size: 0.75em; padding: 0.45em 0.8em; max-width: 180px; }
      .flow-arrow { font-size: 1em; }
      .flow-decision { font-size: 0.8em; }
      .reveal table { font-size: 0.65rem; }
      .reveal h1 { font-size: 1.6rem; }
      .reveal h2 { font-size: 1.2rem; }
    }

    /* Landscape phone — more horizontal room */
    @media (max-height: 500px) and (orientation: landscape) {
      .reveal .slides > section { padding: 1.5vh 4vw; }
      .flow-node { font-size: 0.7em; padding: 0.35em 0.7em; }
      .reveal h1 { font-size: 1.4rem; margin-bottom: 0.2em; }
      .reveal h2 { font-size: 1.1rem; }
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>

  <script>
    // disableLayout: true bypasses the transform: scale that breaks iOS Safari flex/inline-block
    Reveal.initialize({
      hash: true,
      controls: true,
      controlsTutorial: false,
      progress: true,
      slideNumber: 'c/t',
      overview: true,
      center: false,
      disableLayout: true,
      transition: 'slide',
      transitionSpeed: 'fast',
      plugins: [ RevealMarkdown, RevealNotes ],
      markdown: {
        smartypants: false,
        gfm: true
      }
    });
  </script>
