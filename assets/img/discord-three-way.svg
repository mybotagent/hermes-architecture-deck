<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0066cc"/>
    </marker>
  </defs>

  <!-- User (top) -->
  <rect x="350" y="20" width="100" height="48" rx="10" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="400" y="50" text-anchor="middle" font-size="15" font-weight="500" fill="#1d1d1f">User</text>

  <!-- Arrow down -->
  <line x1="400" y1="68" x2="400" y2="100" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Discord thread -->
  <rect x="270" y="100" width="260" height="50" rx="10" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="400" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#0066cc">Discord thread</text>
  <text x="400" y="142" text-anchor="middle" font-size="11" fill="#86868b">one post → one merged reply</text>

  <!-- Arrow down -->
  <line x1="400" y1="150" x2="400" y2="182" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Hermes (orchestrator) -->
  <rect x="240" y="182" width="320" height="68" rx="12" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="400" y="208" text-anchor="middle" font-size="16" font-weight="600" fill="#0066cc">Hermes</text>
  <text x="400" y="228" text-anchor="middle" font-size="12" fill="#86868b">orchestrator · owns Memory and Soul</text>
  <text x="400" y="244" text-anchor="middle" font-size="11" fill="#86868b">always speaks first</text>

  <!-- Dispatch arrows (branch out) -->
  <path d="M 280 250 Q 220 290 180 320" stroke="#0066cc" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 520 250 Q 580 290 620 320" stroke="#0066cc" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Claude Bot A (Plannerbot) -->
  <rect x="40" y="320" width="280" height="70" rx="12" fill="#ffffff" stroke="#ff9500" stroke-width="1.5"/>
  <text x="180" y="346" text-anchor="middle" font-size="15" font-weight="600" fill="#b86e00">Claude Bot A · Plannerbot</text>
  <text x="180" y="365" text-anchor="middle" font-size="12" fill="#86868b">code and planning</text>
  <text x="180" y="381" text-anchor="middle" font-size="11" fill="#86868b">triggers: code touches &gt; 200 lines</text>

  <!-- Claude Bot B (Verifierbot) -->
  <rect x="480" y="320" width="280" height="70" rx="12" fill="#ffffff" stroke="#5856d6" stroke-width="1.5"/>
  <text x="620" y="346" text-anchor="middle" font-size="15" font-weight="600" fill="#5856d6">Claude Bot B · Verifierbot</text>
  <text x="620" y="365" text-anchor="middle" font-size="12" fill="#86868b">research and verification</text>
  <text x="620" y="381" text-anchor="middle" font-size="11" fill="#86868b">triggers: claim needs evidence</text>

  <!-- Return arrows (dashed) -->
  <path d="M 180 320 Q 220 290 280 270" stroke="#0066cc" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 620 320 Q 580 290 520 270" stroke="#0066cc" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow down to synthesize -->
  <line x1="400" y1="390" x2="400" y2="430" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Synthesize -->
  <rect x="270" y="430" width="260" height="50" rx="10" fill="#ffffff" stroke="#34c759" stroke-width="1.5"/>
  <text x="400" y="454" text-anchor="middle" font-size="15" font-weight="600" fill="#2a7d3e">Synthesize</text>
  <text x="400" y="472" text-anchor="middle" font-size="11" fill="#86868b">merge code · citations · framing</text>

  <!-- Arrow down to User -->
  <line x1="400" y1="480" x2="400" y2="510" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- User (bottom) -->
  <rect x="320" y="510" width="160" height="40" rx="10" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="400" y="535" text-anchor="middle" font-size="14" font-weight="500" fill="#1d1d1f">User · one reply</text>
</svg>