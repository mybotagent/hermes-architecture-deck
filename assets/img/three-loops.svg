<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 660" width="800" height="660" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0066cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="13" letter-spacing="1.5" font-weight="500" fill="#86868b">THREE COMPOUND LOOPS</text>

  <!-- ===== LOOP 1 · MANUAL ===== -->
  <rect x="40" y="60" width="720" height="160" rx="16" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="65" y="90" font-size="11" letter-spacing="2.5" font-weight="600" fill="#0066cc">LOOP 1 · MANUAL</text>

  <rect x="70" y="115" width="180" height="80" rx="10" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="160" y="148" text-anchor="middle" font-size="15" font-weight="500" fill="#1d1d1f">workflow</text>
  <text x="160" y="168" text-anchor="middle" font-size="15" font-weight="500" fill="#1d1d1f">run</text>

  <line x1="260" y1="155" x2="350" y2="155" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="360" y="115" width="200" height="80" rx="10" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="460" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#0066cc">procedure</text>
  <text x="460" y="168" text-anchor="middle" font-size="15" font-weight="600" fill="#0066cc">written</text>

  <line x1="570" y1="155" x2="660" y2="155" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="670" y="115" width="80" height="80" rx="10" fill="#ffffff" stroke="#34c759" stroke-width="1.5"/>
  <text x="710" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#2a7d3e">next run</text>
  <text x="710" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#2a7d3e">faster</text>

  <!-- ===== LOOP 2 · MEMORY ===== -->
  <rect x="40" y="240" width="720" height="160" rx="16" fill="#ffffff" stroke="#5856d6" stroke-width="1.5"/>
  <text x="65" y="270" font-size="11" letter-spacing="2.5" font-weight="600" fill="#5856d6">LOOP 2 · MEMORY</text>

  <rect x="70" y="295" width="180" height="80" rx="10" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="160" y="328" text-anchor="middle" font-size="15" font-weight="500" fill="#1d1d1f">session</text>
  <text x="160" y="348" text-anchor="middle" font-size="15" font-weight="500" fill="#1d1d1f">ends</text>

  <line x1="260" y1="335" x2="350" y2="335" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="360" y="295" width="200" height="80" rx="10" fill="#ffffff" stroke="#5856d6" stroke-width="1.5"/>
  <text x="460" y="328" text-anchor="middle" font-size="15" font-weight="600" fill="#5856d6">notebook</text>
  <text x="460" y="348" text-anchor="middle" font-size="15" font-weight="600" fill="#5856d6">updated</text>

  <line x1="570" y1="335" x2="660" y2="335" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="670" y="295" width="80" height="80" rx="10" fill="#ffffff" stroke="#34c759" stroke-width="1.5"/>
  <text x="710" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#2a7d3e">next turn</text>
  <text x="710" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="#2a7d3e">warmer</text>

  <!-- ===== LOOP 3 · PIPELINE ===== -->
  <rect x="40" y="420" width="720" height="160" rx="16" fill="#ffffff" stroke="#ff9500" stroke-width="1.5"/>
  <text x="65" y="450" font-size="11" letter-spacing="2.5" font-weight="600" fill="#b86e00">LOOP 3 · PIPELINE</text>

  <rect x="70" y="475" width="180" height="80" rx="10" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="160" y="503" text-anchor="middle" font-size="14" font-weight="500" fill="#1d1d1f">monthly</text>
  <text x="160" y="523" text-anchor="middle" font-size="14" font-weight="500" fill="#1d1d1f">review</text>

  <line x1="260" y1="515" x2="350" y2="515" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="360" y="475" width="200" height="80" rx="10" fill="#ffffff" stroke="#ff9500" stroke-width="1.5"/>
  <text x="460" y="508" text-anchor="middle" font-size="14" font-weight="600" fill="#b86e00">past calls</text>
  <text x="460" y="528" text-anchor="middle" font-size="14" font-weight="600" fill="#b86e00">analysed</text>

  <line x1="570" y1="515" x2="660" y2="515" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="670" y="475" width="80" height="80" rx="10" fill="#ffffff" stroke="#34c759" stroke-width="1.5"/>
  <text x="710" y="518" text-anchor="middle" font-size="13" font-weight="600" fill="#2a7d3e">prompts</text>
  <text x="710" y="538" text-anchor="middle" font-size="13" font-weight="600" fill="#2a7d3e">sharper</text>

  <!-- Bottom note -->
  <rect x="40" y="600" width="720" height="50" rx="10" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="400" y="623" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">All three loops write back to long-term organs</text>
  <text x="400" y="640" text-anchor="middle" font-size="12" fill="#86868b" font-style="italic">After three months, the system runs faster on the same inputs — not because the Brain got smarter</text>
</svg>